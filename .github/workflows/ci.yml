name: CI

on:
pull_request:
branches:
- main

permissions:
contents: read

jobs:
lint:
runs-on: ubuntu-latest

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install Python dependencies
    run: |
      python -m pip install --upgrade pip
      pip install ruff
      if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  - name: Run Ruff
    run: ruff check .


tests:
runs-on: ubuntu-latest


steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up Node.js
    uses: actions/setup-node@v4
    with:
      node-version: "20"

  - name: Install Frontend dependencies
    working-directory: ./Frontend
    run: npm install

  - name: Build Frontend
    working-directory: ./Frontend
    run: npm run build

